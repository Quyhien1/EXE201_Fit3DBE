<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fit3d Password Reset OTP</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="background:#111827;padding:20px 24px;color:#ffffff;font-size:20px;font-weight:700;">
              Fit3d
            </td>
          </tr>
          <tr>
            <td style="padding:28px 24px;">
              <p style="margin:0 0 12px 0;font-size:16px;line-height:1.6;">Hello {{FullName}},</p>
              <p style="margin:0 0 16px 0;font-size:14px;line-height:1.7;color:#374151;">
                We received a request to reset your password. Use the OTP below to continue:
              </p>

              <div style="text-align:center;margin:20px 0;">
                <span style="display:inline-block;font-size:32px;letter-spacing:8px;font-weight:700;color:#111827;background:#f3f4f6;border:1px dashed #9ca3af;border-radius:10px;padding:14px 20px;">{{OtpCode}}</span>
              </div>

              <p style="margin:0 0 10px 0;font-size:14px;line-height:1.7;color:#374151;">
                This OTP is refreshed every 1 minute and can be used only once.
              </p>
              <p style="margin:0;font-size:13px;line-height:1.7;color:#6b7280;">
                If you did not request this action, please ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;">
              © {{Year}} Fit3d. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
